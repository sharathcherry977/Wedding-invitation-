<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sowmya & Sharathchandran | Wedding Invitation</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Marcellus&family=Mukta:wght@300;400;500&family=Tiro+Devanagari+Sanskrit&family=Ramabhadra&family=Mallanna&display=swap" rel="stylesheet">

    <style>
        :root {
            --maroon:      #5e1420;
            --maroon-deep: #3f0d15;
            --gold:        #c9974d;
            --gold-light:  #e8c585;
            --ivory:       #fff8ec;
            --teal:        #1f4e3d;
            --saffron:     #e8a33d;
            --ink:         #2a1810;
            --cream:       #fffaf2;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        /* ============================================================
           MAIN PAGE
        ============================================================ */
        body {
            font-family: 'Mallanna', 'Mukta', sans-serif;
            background: var(--cream);
            color: var(--ink);
            min-height: 100vh;
        }
        .page-wrapper {
            max-width: 480px;
            margin: 0 auto;
            padding: 36px 24px 50px;
            text-align: center;
        }
        .names-header {
            font-family: 'Ramabhadra', 'Marcellus', serif;
            font-size: clamp(28px, 8vw, 38px);
            color: var(--maroon);
            line-height: 1.3;
        }
        .names-amp {
            font-family: 'Cormorant Garamond', serif;
            font-size: 22px;
            color: var(--gold);
            display: block;
            margin: 4px 0;
        }
        .gold-rule {
            width: 60px; height: 1.5px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            margin: 18px auto;
        }
        .tagline {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 15.5px;
            color: #7a6a5a;
            line-height: 1.7;
            padding: 0 12px;
            margin-bottom: 28px;
        }
        .photo-wrap {
            position: relative;
            width: 100%;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 8px 28px rgba(94,20,32,0.13);
            cursor: pointer;
            border: 3px solid var(--gold);
            margin-bottom: 6px;
        }
        .couple-pic { width: 100%; display: block; }
        .music-badge {
            position: absolute;
            bottom: 12px; left: 50%;
            transform: translateX(-50%);
            background: rgba(63,13,21,0.78);
            color: var(--gold-light);
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--gold);
            white-space: nowrap;
            pointer-events: none;
            animation: badge-pulse 2.2s ease-in-out infinite;
        }
        @keyframes badge-pulse { 0%,100%{opacity:.7} 50%{opacity:1} }
        .details-box {
            border-top: 1px solid rgba(201,151,77,0.35);
            border-bottom: 1px solid rgba(201,151,77,0.35);
            padding: 22px 0; margin: 28px 0;
        }
        .main-event-date {
            font-family: 'Marcellus', serif;
            font-size: 19px; color: var(--ink); letter-spacing: 1px;
        }
        .main-event-time {
            font-size: 16px; color: var(--gold); margin-top: 6px;
            font-family: 'Cormorant Garamond', serif; font-weight: 600;
        }
        .main-event-venue {
            font-size: 13.5px; color: #7a6a5a; margin-top: 8px; line-height: 1.5;
        }
        .btn-row { display: flex; flex-direction: column; gap: 14px; align-items: center; }
        .btn-traditional {
            width: 100%; max-width: 300px;
            padding: 14px 20px;
            background: linear-gradient(135deg, var(--maroon), #801c2d);
            color: var(--gold-light);
            font-family: 'Marcellus', serif;
            font-size: 15.5px; letter-spacing: 1.5px;
            border: 2px solid var(--gold); border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 6px 18px rgba(94,20,32,0.3);
        }
        .btn-map {
            display: inline-block;
            width: 100%; max-width: 300px;
            padding: 13px 20px;
            background: #4a69bd; color: #fff;
            font-family: 'Mallanna', sans-serif;
            font-size: 15px; font-weight: 600;
            text-align: center; text-decoration: none;
            border-radius: 40px;
            box-shadow: 0 5px 14px rgba(74,105,189,0.3);
        }
        audio { display: none; }

        /* ============================================================
           MODAL — full screen overlay, fixed to viewport
        ============================================================ */
        #cardModal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 5000;
            background: var(--maroon-deep);
            overflow: hidden; /* inner scroll handled by #inviteScroll */
        }
        #cardModal.active { display: block; }

        /* Close button — always top-right */
        #closeBtn {
            position: fixed;
            top: 16px; right: 16px;
            width: 44px; height: 44px;
            background: rgba(0,0,0,0.6);
            color: var(--gold-light);
            border: 2px solid var(--gold);
            border-radius: 50%;
            font-size: 20px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            z-index: 9999;
        }

        /* ---- Layer: cinematic intro ---- */
        #cinLayer {
            position: absolute;
            inset: 0;
            background: linear-gradient(#050505, #1a1a1a);
            display: flex; align-items: center; justify-content: center;
            z-index: 400;
            transition: opacity 1.5s ease;
        }
        #cinLayer.fade-out { opacity: 0; pointer-events: none; }
        #cinLayer.gone    { display: none; }
        .trailerText {
            width: 88%; max-width: 420px;
            text-align: center;
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(18px, 5vw, 26px);
            line-height: 1.6; letter-spacing: 1px;
            color: var(--gold-light);
            opacity: 0;
            animation: trailerReveal 4s forwards;
        }
        @keyframes trailerReveal {
            0%   { opacity:0; transform:scale(.85); }
            25%  { opacity:1; transform:scale(1); }
            80%  { opacity:1; }
            100% { opacity:0; }
        }
        .gold-particle {
            position: absolute;
            color: gold; pointer-events: none;
            animation: particleFloat linear infinite;
        }
        @keyframes particleFloat {
            from { transform: translateY(100vh) rotate(0deg); opacity:0; }
            10%  { opacity:.8; }
            90%  { opacity:.8; }
            to   { transform: translateY(-10vh) rotate(360deg); opacity:0; }
        }

        /* ---- Layer: door screen ---- */
        #doorLayer {
            position: absolute;
            inset: 0;
            background: var(--maroon-deep);
            display: flex; align-items: center; justify-content: center;
            z-index: 300;
            perspective: 1600px;
        }
        #doorLayer.gone { display: none; }

        .door-panel {
            position: absolute;
            top: 0; height: 100%; width: 50%;
            background:
                radial-gradient(circle at 50% 8%, var(--gold-light) 0%, transparent 2%),
                repeating-linear-gradient(0deg, transparent 0 38px, rgba(201,151,77,0.18) 38px 40px),
                linear-gradient(180deg, #7a1b29 0%, #5e1420 45%, #3f0d15 100%);
            transition: transform 1.4s cubic-bezier(.76,0,.24,1);
            box-shadow: inset 0 0 60px rgba(0,0,0,0.5);
        }
        .door-left  { left:0;  border-right:3px solid var(--gold); transform-origin: left center; }
        .door-right { right:0; border-left:3px solid var(--gold);  transform-origin: right center; }
        .door-carving {
            position: absolute;
            top:6%; bottom:6%; left:10%; right:10%;
            border:2px solid var(--gold); opacity:.55;
        }
        .door-carving::before,.door-carving::after {
            content:'❀'; position:absolute;
            color:var(--gold); font-size:22px;
            left:50%; transform:translateX(-50%);
        }
        .door-carving::before { top:-14px; }
        .door-carving::after  { bottom:-14px; }
        .pillar-dots {
            position:absolute; left:50%; top:12%;
            transform:translateX(-50%);
            display:flex; flex-direction:column; gap:28px;
        }
        .pillar-dots span {
            width:6px; height:6px;
            background:var(--gold); border-radius:50%; opacity:.7;
        }
        .door-seam {
            position:absolute; top:0; bottom:0; left:50%;
            width:2px; background:var(--gold); z-index:2;
            box-shadow:0 0 12px rgba(201,151,77,0.7);
        }

        #tapPrompt {
            position: relative; z-index:3;
            text-align:center; color:var(--gold-light);
            cursor:pointer;
            animation: pulse-prompt 2.2s ease-in-out infinite;
            -webkit-tap-highlight-color: transparent;
            padding: 20px;
        }
        .tap-om {
            font-family:'Tiro Devanagari Sanskrit',serif;
            font-size:56px; display:block; margin-bottom:14px;
            color:var(--gold);
            text-shadow:0 0 20px rgba(201,151,77,.6);
        }
        .tap-names {
            font-family:'Ramabhadra','Marcellus',serif;
            font-size:20px; letter-spacing:.5px;
            color:var(--ivory); display:block;
        }
        .tap-instr {
            display:block; margin-top:18px;
            font-size:13px; letter-spacing:1px;
            color:var(--gold); opacity:.85;
        }
        @keyframes pulse-prompt {
            0%,100%{ transform:scale(1); opacity:1; }
            50%    { transform:scale(.97); opacity:.75; }
        }

        /* Doors open */
        #cardModal.doors-open .door-left  { transform: rotateY(-92deg); }
        #cardModal.doors-open .door-right { transform: rotateY(92deg); }

        /* ---- Layer: atmosphere (light rays, golden glow, petals) ---- */
        #atmLayer {
            position: absolute;
            inset: 0;
            pointer-events: none;
            z-index: 200;
            opacity: 0;
            transition: opacity 1.5s ease;
        }
        #cardModal.doors-open #atmLayer { opacity: 1; }

        .golden-glow {
            position:absolute; inset:0;
            background:radial-gradient(circle at center, rgba(255,215,120,.35), transparent 60%);
            pointer-events:none;
        }
        .light-rays {
            position:absolute; inset:0;
            background:repeating-conic-gradient(from 0deg,
                rgba(255,215,120,.1) 0deg 8deg,
                transparent 8deg 20deg);
            pointer-events:none;
            animation: rays-spin 30s linear infinite;
        }
        @keyframes rays-spin { to { transform: rotate(360deg); } }

        .petal-field {
            position:absolute; inset:0;
            pointer-events:none; overflow:hidden;
        }
        .petal {
            position:absolute; top:-5%;
            animation: fall linear infinite;
        }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); } }

        /* ---- Layer: scrollable invite content ---- */
        #inviteScroll {
            position: absolute;
            inset: 0;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
        }
        #cardModal.doors-open #inviteScroll {
            opacity: 1;
            pointer-events: auto;
            transition-delay: 1s;
        }

        #invite {
            position: relative;
            max-width: 560px;
            margin: 0 auto;
            background: var(--ivory);
            min-height: 100vh;
            background-image:
                radial-gradient(circle at 0% 0%, rgba(201,151,77,0.08), transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(31,78,61,0.06), transparent 40%);
            font-family: 'Mallanna','Mukta',sans-serif;
            color: var(--ink);
        }
        .border-frame {
            position: absolute;
            inset: 10px;
            border: 2px solid var(--gold);
            pointer-events: none; z-index:1;
        }
        .border-frame::before {
            content:''; position:absolute; inset:10px;
            border:1px solid var(--gold); opacity:.5;
        }

        /* Invite sections */
        .inv-sec {
            position:relative; padding:52px 36px; text-align:center;
        }
        .corner-motif {
            font-family:'Tiro Devanagari Sanskrit',serif;
            color:var(--gold); font-size:26px; opacity:.8;
        }
        .inv-divider {
            width:70px; height:2px;
            background:linear-gradient(90deg,transparent,var(--gold),transparent);
            margin:22px auto;
        }

        /* Hero */
        #inv-hero { padding-top:60px; }
        .ganesha {
            font-family:'Tiro Devanagari Sanskrit',serif;
            font-size:34px; color:var(--maroon); letter-spacing:1px;
        }
        .invite-tagline {
            font-size:15px; color:var(--teal); margin-top:10px;
        }
        .couple-names { margin-top:32px; }
        .couple-names .cname {
            font-family:'Ramabhadra','Marcellus',serif;
            font-size:clamp(30px,8vw,42px);
            color:var(--maroon); line-height:1.4; display:block;
            overflow:hidden; white-space:nowrap;
            width:0;
        }
        #cardModal.doors-open .couple-names .cname {
            animation: typing 3s steps(30,end) forwards;
            animation-delay: 0.6s;
        }
        #cardModal.doors-open .couple-names .cname.delay {
            animation-delay: 3.8s;
        }
        @keyframes typing { from{width:0} to{width:100%} }
        .couple-names .camp {
            font-family:'Cormorant Garamond',serif;
            font-size:24px; color:var(--gold);
            display:block; margin:6px 0;
        }

        /* Kolam */
        #kolam {
            margin:30px auto 10px;
            width:180px; height:180px; display:block;
        }
        #kolam path, #kolam circle {
            fill:none; stroke:var(--gold);
            stroke-width:1.6; stroke-linecap:round;
            stroke-dasharray:1000; stroke-dashoffset:1000;
        }
        #cardModal.doors-open #kolam path,
        #cardModal.doors-open #kolam circle {
            animation:draw-kolam 2.8s ease forwards;
            animation-delay:1s;
        }
        #kolam .dot { fill:var(--saffron); stroke:none; opacity:0; }
        #cardModal.doors-open #kolam .dot {
            animation:fade-dot 0.6s ease 3.2s forwards;
        }
        @keyframes draw-kolam { to{stroke-dashoffset:0} }
        @keyframes fade-dot   { to{opacity:1} }
        .with-blessings { margin-top:16px; font-size:14.5px; color:var(--teal); }

        /* Families */
        #inv-families {
            background:linear-gradient(180deg,transparent,rgba(201,151,77,0.06),transparent);
        }
        .family-block { margin-bottom:28px; }
        .family-role  { font-size:13px; letter-spacing:.5px; color:var(--gold); margin-bottom:6px; }
        .family-name  {
            font-family:'Ramabhadra','Cormorant Garamond',serif;
            font-size:22px; color:var(--maroon); font-weight:600;
        }
        .family-parents { font-size:14px; color:var(--ink); opacity:.8; margin-top:4px; line-height:1.5; }

        /* Event */
        #inv-event { background:var(--maroon); color:var(--ivory); }
        #inv-event .corner-motif { color:var(--gold-light); }
        .sec-label { font-size:12.5px; letter-spacing:2px; text-transform:uppercase; color:var(--gold-light); margin-bottom:16px; }
        .muhurtham-time { font-family:'Marcellus',serif; font-size:42px; color:var(--gold-light); margin:6px 0 2px; }
        .muhurtham-label { font-size:12.5px; letter-spacing:1px; opacity:.75; }
        .ev-date { font-family:'Cormorant Garamond',serif; font-size:22px; margin-top:18px; color:var(--ivory); }
        .ev-day  { font-size:13px; opacity:.7; margin-top:2px; }
        .venue-card {
            margin-top:28px; padding:20px 18px;
            border:1px solid rgba(201,151,77,.45);
            background:rgba(255,255,255,.04); border-radius:4px;
        }
        .venue-name { font-size:17px; color:var(--gold-light); line-height:1.65; }
        .venue-city { font-size:13px; margin-top:6px; opacity:.75; line-height:1.5; }
        .map-link {
            display:inline-block; margin-top:16px; padding:10px 26px;
            border:1px solid var(--gold); color:var(--gold-light);
            text-decoration:none; font-size:12.5px; letter-spacing:2px;
            text-transform:uppercase; border-radius:2px;
        }

        /* Countdown */
        #inv-countdown { padding:44px 36px; }
        .cd-label { font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--teal); margin-bottom:18px; }
        #countdown { display:flex; justify-content:center; gap:12px; }
        .cd-unit {
            background:var(--ivory); border:1.5px solid var(--gold);
            border-radius:6px; width:66px; padding:12px 0;
        }
        .cd-num { font-family:'Marcellus',serif; font-size:26px; color:var(--maroon); display:block; }
        .cd-unit-label { font-size:10px; letter-spacing:1px; text-transform:uppercase; color:var(--teal); margin-top:4px; display:block; }

        /* Footer */
        #inv-footer { padding-bottom:70px; }
        .footer-quote {
            font-family:'Cormorant Garamond',serif; font-style:italic;
            font-size:17px; color:var(--maroon); line-height:1.85;
            max-width:360px; margin:0 auto;
        }
        .footer-names {
            margin-top:22px;
            font-family:'Ramabhadra','Marcellus',serif;
            font-size:19px; color:var(--gold); letter-spacing:1px;
        }

        /* Scroll reveal */
        .reveal { opacity:0; transform:translateY(36px); transition:all 1s ease; }
        .reveal.show { opacity:1; transform:translateY(0); }

        /* ---- Rose Petal SVG ---- */
        .rose-petal {
            position: absolute;
            top: -60px;
            pointer-events: none;
            animation: petalDrift linear infinite;
            will-change: transform;
        }
        .rose-petal svg {
            display: block;
        }
        @keyframes petalDrift {
            0%   { transform: translateY(-60px) translateX(0px)   rotate(0deg)   rotateX(0deg);   opacity: 0; }
            8%   { opacity: 0.92; }
            30%  { transform: translateY(28vh)  translateX(18px)  rotate(110deg) rotateX(40deg); }
            55%  { transform: translateY(55vh)  translateX(-14px) rotate(230deg) rotateX(15deg); }
            80%  { transform: translateY(82vh)  translateX(22px)  rotate(330deg) rotateX(55deg); opacity: 0.85; }
            100% { transform: translateY(112vh) translateX(-8px)  rotate(480deg) rotateX(20deg); opacity: 0; }
        }

        /* ---- Inv
